<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #071116; }
      .panel { fill: #0d232b; stroke: #1d5361; stroke-width: 2; }
      .device { fill: #11191d; stroke: #26d8ee; stroke-width: 3; }
      .device2 { fill: #162229; stroke: #627985; stroke-width: 2; }
      .cyan { fill: #27d8ee; }
      .orange { fill: #ff6a00; }
      .green { fill: #42e88a; }
      .white { fill: #eef6f8; }
      .muted { fill: #9fb4bd; }
      .line { stroke: #35d6e8; stroke-width: 2; fill: none; }
      .dim { stroke: #eef6f8; stroke-width: 2; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dimText { fill: #eef6f8; font: 700 20px Arial, sans-serif; }
      .label { fill: #eef6f8; font: 700 18px Arial, sans-serif; }
      .small { fill: #aac0c8; font: 15px Arial, sans-serif; }
      .tiny { fill: #aac0c8; font: 13px Arial, sans-serif; }
      .title { fill: #eef6f8; font: 800 42px Arial, sans-serif; letter-spacing: 7px; }
      .sub { fill: #27d8ee; font: 700 22px Arial, sans-serif; letter-spacing: 2px; }
      .note { fill: #d9eef2; font: 18px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#eef6f8"/>
    </marker>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3940"/>
      <stop offset="0.45" stop-color="#10191e"/>
      <stop offset="1" stop-color="#05090b"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <text class="title" x="60" y="72">SAVE SWIMMER LITE</text>
  <text class="sub" x="62" y="108">BOCETO DE MAQUETA 80 x 50 x 20 mm</text>
  <text class="note" x="62" y="140">Referencia provisoria para cortar en telgopor, foam, carton pluma o impresion 3D basica.</text>

  <!-- TOP VIEW -->
  <rect class="panel" x="50" y="180" width="610" height="330" rx="10"/>
  <text class="label" x="80" y="220">VISTA SUPERIOR</text>
  <text class="small" x="80" y="245">Forma hidrodinamica aproximada, no carcasa final.</text>

  <rect x="160" y="275" width="360" height="190" rx="82" fill="url(#shine)" stroke="#26d8ee" stroke-width="3"/>
  <rect x="197" y="306" width="286" height="128" rx="58" fill="none" stroke="#2a535e" stroke-width="2"/>
  <rect x="285" y="436" width="110" height="13" rx="7" class="cyan"/>
  <text class="white" x="259" y="365" font-family="Arial" font-size="27" font-weight="800" letter-spacing="7">SAVE</text>
  <text class="cyan" x="270" y="394" font-family="Arial" font-size="18" font-weight="700" letter-spacing="6">SWIMMER</text>

  <line class="dim" x1="160" y1="490" x2="520" y2="490"/>
  <text class="dimText" x="289" y="522">80 mm</text>
  <line class="dim" x1="540" y1="275" x2="540" y2="465"/>
  <text class="dimText" x="552" y="378">50 mm</text>

  <line class="line" x1="428" y1="290" x2="590" y2="245"/>
  <circle class="cyan" cx="428" cy="290" r="5"/>
  <text class="label" x="598" y="244">zona GPS arriba</text>
  <text class="tiny" x="598" y="264">libre de metal y bateria encima</text>

  <line class="line" x1="340" y1="370" x2="83" y2="322"/>
  <circle class="orange" cx="340" cy="370" r="6"/>
  <text class="label" x="80" y="310">IMU centrada</text>
  <text class="tiny" x="80" y="332">ideal para simetria LR/UD</text>

  <line class="line" x1="340" y1="442" x2="83" y2="445"/>
  <circle class="cyan" cx="340" cy="442" r="5"/>
  <text class="label" x="80" y="442">LED estado 360</text>
  <text class="tiny" x="80" y="464">visible de frente/laterales</text>

  <!-- SIDE VIEW -->
  <rect class="panel" x="710" y="180" width="640" height="330" rx="10"/>
  <text class="label" x="740" y="220">VISTA LATERAL</text>
  <text class="small" x="740" y="245">Lomo suave arriba, base dorsal mas plana.</text>

  <path d="M 820 400 C 860 305, 1175 305, 1215 400 C 1160 432, 875 432, 820 400 Z"
        fill="url(#shine)" stroke="#26d8ee" stroke-width="3"/>
  <path d="M 858 394 C 900 348, 1135 348, 1177 394" fill="none" stroke="#49636d" stroke-width="2"/>
  <rect x="978" y="412" width="85" height="10" rx="5" class="cyan"/>

  <line class="dim" x1="1255" y1="330" x2="1255" y2="430"/>
  <text class="dimText" x="1270" y="386">20 mm</text>
  <line class="dim" x1="820" y1="455" x2="1215" y2="455"/>
  <text class="dimText" x="970" y="486">80 mm</text>

  <line class="line" x1="850" y1="408" x2="742" y2="438"/>
  <text class="label" x="740" y="460">base dorsal curva</text>
  <text class="tiny" x="740" y="480">que apoye sin molestar escapas</text>

  <line class="line" x1="1160" y1="390" x2="1278" y2="327"/>
  <text class="label" x="1135" y="313">sensor de agua</text>
  <text class="tiny" x="1135" y="333">zona expuesta al exterior</text>

  <!-- INTERNAL LAYOUT -->
  <rect class="panel" x="50" y="555" width="610" height="295" rx="10"/>
  <text class="label" x="80" y="595">DISTRIBUCION INTERNA REFERENCIAL</text>
  <text class="small" x="80" y="620">Sirve para ordenar volumen. En PCB final se compacta.</text>

  <rect x="130" y="660" width="455" height="120" rx="55" fill="#0a1519" stroke="#365c66" stroke-width="2"/>
  <rect x="178" y="684" width="128" height="72" rx="8" fill="#182c34" stroke="#27d8ee" stroke-width="2"/>
  <text class="tiny" x="205" y="724">BATERIA</text>
  <rect x="326" y="674" width="118" height="92" rx="8" fill="#19272d" stroke="#9fb4bd" stroke-width="2"/>
  <text class="tiny" x="369" y="720">PCB</text>
  <rect x="463" y="686" width="72" height="68" rx="7" fill="#14313b" stroke="#42e88a" stroke-width="2"/>
  <text class="tiny" x="479" y="724">GPS</text>
  <circle cx="385" cy="720" r="16" class="orange"/>
  <text class="tiny" x="360" y="790">IMU cerca del centro geometrico</text>
  <text class="tiny" x="457" y="646">GPS arriba y despejado</text>
  <text class="tiny" x="172" y="646">bateria plana abajo</text>

  <line class="line" x1="130" y1="720" x2="80" y2="720"/>
  <text class="tiny" x="80" y="704">fijacion</text>
  <text class="tiny" x="80" y="722">traje/correa</text>
  <line class="line" x1="585" y1="720" x2="625" y2="720"/>
  <text class="tiny" x="535" y="804">reed magnetico / encendido sin abrir carcasa</text>

  <!-- MOCKUP STEPS -->
  <rect class="panel" x="710" y="555" width="640" height="295" rx="10"/>
  <text class="label" x="740" y="595">GUIA RAPIDA PARA MAQUETA FISICA</text>

  <circle class="cyan" cx="760" cy="650" r="12"/><text class="note" x="785" y="656">1. Cortar bloque 80 x 50 x 20 mm.</text>
  <circle class="cyan" cx="760" cy="695" r="12"/><text class="note" x="785" y="701">2. Redondear esquinas y bajar el frente.</text>
  <circle class="cyan" cx="760" cy="740" r="12"/><text class="note" x="785" y="746">3. Marcar centro exacto para IMU.</text>
  <circle class="cyan" cx="760" cy="785" r="12"/><text class="note" x="785" y="791">4. Marcar GPS arriba, sin metal encima.</text>
  <circle class="orange" cx="760" cy="830" r="12"/><text class="note" x="785" y="836">5. Probar comodidad en espalda alta antes de sellar.</text>

  <rect x="1085" y="630" width="190" height="118" rx="50" fill="url(#shine)" stroke="#26d8ee" stroke-width="3"/>
  <rect x="1132" y="737" width="96" height="10" rx="5" class="cyan"/>
  <text class="tiny" x="1112" y="778">tamano objetivo Lite</text>
  <text class="dimText" x="1114" y="810">80 x 50 x 20</text>

  <text class="small" x="62" y="880">Nota: este boceto es volumetrico. La medida final puede crecer si se agrega GSM, antena externa, Qi o bateria mayor.</text>
</svg>
