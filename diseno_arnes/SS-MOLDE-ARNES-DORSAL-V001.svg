<svg xmlns="http://www.w3.org/2000/svg" width="420mm" height="297mm" viewBox="0 0 420 297">
  <defs>
    <style>
      .cut { fill: none; stroke: #111; stroke-width: 0.7; }
      .seam { fill: none; stroke: #00a6c8; stroke-width: 0.45; stroke-dasharray: 3 2; }
      .fold { fill: none; stroke: #ff7a00; stroke-width: 0.45; stroke-dasharray: 1.5 1.5; }
      .label { font-family: Arial, sans-serif; font-size: 4px; fill: #111; }
      .small { font-family: Arial, sans-serif; font-size: 3.2px; fill: #333; }
      .title { font-family: Arial, sans-serif; font-size: 7px; font-weight: 700; fill: #111; }
      .hint { fill: #f4f7f8; stroke: #d8e0e3; stroke-width: 0.3; }
      .notch { stroke: #111; stroke-width: 0.6; }
    </style>
  </defs>

  <rect x="0" y="0" width="420" height="297" fill="#fff"/>

  <text x="16" y="17" class="title">SAVE SWIMMER - MOLDE ARNES DORSAL V001</text>
  <text x="16" y="25" class="small">Medidas en mm. Imprimir al 100%. Margen de costura sugerido: 8 mm. Validar calce antes de usar en agua.</text>
  <text x="16" y="31" class="small">Material sugerido: neopreno 2-3 mm o lycra/neopreno + cinta elastica 35-40 mm + velcro. Version artesanal para prueba de posicion.</text>

  <!-- Scale ruler -->
  <line x1="16" y1="40" x2="116" y2="40" class="cut"/>
  <line x1="16" y1="37" x2="16" y2="43" class="cut"/>
  <line x1="116" y1="37" x2="116" y2="43" class="cut"/>
  <text x="50" y="37" class="small">regla control 100 mm</text>

  <!-- Main back panel cut line -->
  <path id="back_panel" class="cut" d="
    M 96 74
    C 83 76, 72 85, 64 100
    C 56 116, 50 136, 39 154
    C 33 164, 31 174, 37 183
    C 43 192, 57 189, 66 179
    C 76 167, 82 148, 89 135
    C 96 121, 104 116, 115 116
    C 126 116, 134 121, 141 135
    C 148 148, 154 167, 164 179
    C 173 189, 187 192, 193 183
    C 199 174, 197 164, 191 154
    C 180 136, 174 116, 166 100
    C 158 85, 147 76, 134 74
    C 126 73, 119 78, 115 86
    C 111 78, 104 73, 96 74
    Z"/>
  <path class="seam" d="
    M 98 84
    C 88 86, 80 93, 73 106
    C 65 122, 59 141, 49 158
    C 44 166, 43 173, 47 178
    C 51 183, 59 181, 66 173
    C 75 161, 81 143, 88 130
    C 95 117, 104 108, 115 108
    C 126 108, 135 117, 142 130
    C 149 143, 155 161, 164 173
    C 171 181, 179 183, 183 178
    C 187 173, 186 166, 181 158
    C 171 141, 165 122, 157 106
    C 150 93, 142 86, 132 84
    C 125 83, 119 89, 115 98
    C 111 89, 105 83, 98 84
    Z"/>
  <text x="72" y="68" class="label">PIEZA A - espalda dorsal / cortar 1 neopreno</text>
  <text x="76" y="202" class="small">Objetivo: apoyar entre omoplatos sin tocar cuello ni axilas.</text>

  <!-- Center pocket placement -->
  <rect x="96" y="116" width="38" height="78" rx="8" class="hint"/>
  <rect x="104" y="124" width="22" height="50" rx="5" class="cut"/>
  <rect x="99" y="146" width="32" height="16" rx="2" class="fold"/>
  <text x="101" y="181" class="small">bolsillo</text>
  <text x="101" y="186" class="small">dispositivo</text>
  <line x1="96" y1="112" x2="134" y2="112" class="notch"/>
  <text x="137" y="117" class="small">zona de bolsillo</text>

  <!-- Strap anchors notches -->
  <line x1="55" y1="173" x2="65" y2="183" class="notch"/>
  <line x1="175" y1="173" x2="165" y2="183" class="notch"/>
  <line x1="76" y1="101" x2="88" y2="111" class="notch"/>
  <line x1="154" y1="101" x2="142" y2="111" class="notch"/>
  <text x="21" y="219" class="small">Marcas: unir aqui correas elasticas. Reforzar con costura en X.</text>

  <!-- Device pocket piece -->
  <rect x="236" y="70" width="52" height="88" rx="8" class="cut"/>
  <rect x="244" y="78" width="36" height="72" rx="6" class="seam"/>
  <text x="231" y="64" class="label">PIEZA B - base bolsillo / cortar 1 neopreno</text>
  <text x="239" y="166" class="small">52 x 88 mm aprox.</text>
  <text x="239" y="171" class="small">Ajustar a carcasa real + 5 mm.</text>

  <!-- Pocket front elastic/retainer -->
  <rect x="304" y="76" width="72" height="25" rx="2" class="cut"/>
  <rect x="310" y="82" width="60" height="13" rx="1.5" class="seam"/>
  <text x="303" y="68" class="label">PIEZA C - retencion frontal / cortar 1 elastico</text>
  <text x="304" y="109" class="small">Cinta elastica 35-40 mm o neopreno doble.</text>

  <!-- Pocket flap -->
  <path class="cut" d="M304 130 L376 130 L376 167 Q340 181 304 167 Z"/>
  <path class="seam" d="M310 137 L370 137 L370 162 Q340 173 310 162 Z"/>
  <text x="304" y="123" class="label">PIEZA D - tapa opcional con velcro</text>
  <text x="307" y="188" class="small">Usar si el dispositivo puede salirse al rotar.</text>

  <!-- Shoulder straps -->
  <path class="cut" d="M235 205 C246 193, 263 193, 274 205 L274 282 L235 282 Z"/>
  <path class="seam" d="M242 208 C250 201, 259 201, 267 208 L267 274 L242 274 Z"/>
  <text x="231" y="198" class="label">PIEZA E - correa hombro / cortar 2 elastico-neopreno</text>
  <text x="237" y="290" class="small">Largo inicial 260-320 mm, regular en cuerpo.</text>

  <!-- Lower stabilization strap -->
  <rect x="305" y="220" width="86" height="34" rx="3" class="cut"/>
  <rect x="312" y="227" width="72" height="20" rx="2" class="seam"/>
  <text x="304" y="213" class="label">PIEZA F - correa baja / cortar 1 o 2</text>
  <text x="307" y="263" class="small">Cinta elastica 35-40 mm. Cierre lateral con velcro.</text>

  <!-- Construction notes -->
  <rect x="16" y="236" width="192" height="44" rx="2" class="hint"/>
  <text x="21" y="245" class="label">Notas para costurera</text>
  <text x="21" y="253" class="small">1. Coser bies elastico en todo el borde para evitar roce.</text>
  <text x="21" y="259" class="small">2. Reforzar uniones de correas con costura cuadrada + X.</text>
  <text x="21" y="265" class="small">3. El bolsillo debe quedar firme, centrado y con drenaje inferior.</text>
  <text x="21" y="271" class="small">4. Primera muestra: probar 10 min en seco, luego agua tranquila.</text>

  <!-- Fit notes -->
  <rect x="216" y="22" width="178" height="34" rx="2" class="hint"/>
  <text x="222" y="32" class="label">Medidas base de prueba</text>
  <text x="222" y="40" class="small">Dispositivo estimado: 74 x 56 x 18 mm. Si el prototipo es mayor, ampliar bolsillo.</text>
  <text x="222" y="46" class="small">La pieza A esta pensada como molde inicial, no talla final universal.</text>
  <text x="222" y="52" class="small">Para nadador grande: escalar pieza A 105-112%. Para pequeno: 92-96%.</text>
</svg>
