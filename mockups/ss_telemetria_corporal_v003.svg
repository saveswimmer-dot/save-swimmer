<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      .bg{fill:#020b10}
      .card{fill:#0d2832;stroke:#1c5564;stroke-width:2}
      .panel{fill:#06171d;stroke:#174451;stroke-width:2}
      .grid{stroke:#234e58;stroke-width:2;opacity:.75}
      .grid-soft{stroke:#234e58;stroke-width:1.5;opacity:.4}
      .txt{font-family:Arial, Helvetica, sans-serif;fill:#eaf8fb}
      .muted{fill:#a8c0c6}
      .cyan{fill:#2fd8e8}
      .orange{fill:#ff7a1a}
      .green{fill:#5df0a0}
      .red{fill:#ff5d75}
      .dash{stroke-dasharray:14 12}
      .body-fill{fill:#102f3a;stroke:#dff8fb;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .body-line{fill:none;stroke:#dff8fb;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .body-soft{fill:none;stroke:#dff8fb;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;opacity:.48}
      .line-cyan{stroke:#2fd8e8;stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .line-cyan-thin{stroke:#2fd8e8;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .line-green{stroke:#5df0a0;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .line-orange{stroke:#ff7a1a;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .ghost{stroke:#2fd8e8;stroke-width:3;fill:none;opacity:.22;stroke-linecap:round}
    </style>
  </defs>

  <rect class="bg" width="1080" height="1920"/>

  <text class="txt" x="60" y="112" font-size="64" font-weight="700" letter-spacing="8">SAVE SWIMMER</text>
  <text class="cyan" x="60" y="168" font-size="34" font-weight="700" letter-spacing="5">LECTURA CORPORAL</text>
  <rect x="720" y="82" width="285" height="72" rx="8" fill="#10313c" stroke="#1d5968"/>
  <circle cx="760" cy="118" r="9" class="green"/>
  <text class="txt" x="780" y="130" font-size="28" font-weight="700">BLE + GPS activo</text>

  <rect class="card" x="48" y="210" width="984" height="535" rx="10"/>
  <text class="txt muted" x="80" y="270" font-size="31">Rotacion dorsal</text>
  <text class="txt" x="80" y="318" font-size="44" font-weight="700">Hombros contra linea de agua</text>
  <rect class="panel" x="80" y="350" width="920" height="335" rx="6"/>

  <line class="grid" x1="125" y1="518" x2="955" y2="518"/>
  <text class="muted txt" x="130" y="498" font-size="24">linea de agua / eje 0</text>
  <line class="line-green dash" x1="170" y1="442" x2="910" y2="442" opacity=".55"/>
  <line class="line-green dash" x1="170" y1="594" x2="910" y2="594" opacity=".55"/>
  <text class="green txt" x="180" y="428" font-size="23">objetivo 32-45 grados</text>
  <text class="orange txt" x="745" y="428" font-size="23">sobre 50</text>

  <!-- More human dorsal/front swimmer silhouette -->
  <circle cx="535" cy="515" r="60" class="body-fill"/>
  <path class="body-fill" d="M408 570 C460 620 535 642 612 604 C642 589 674 564 706 532 C665 516 612 506 535 515 C482 521 438 539 408 570Z"/>
  <path class="body-line" d="M375 586 C330 632 300 682 278 730"/>
  <path class="body-line" d="M698 523 C760 462 824 416 910 390"/>
  <path class="body-soft" d="M355 562 C302 540 238 532 168 548"/>
  <path class="body-soft" d="M715 516 C770 530 832 535 914 512"/>
  <path class="body-soft" d="M448 568 C492 603 546 614 610 592"/>
  <path class="body-soft" d="M502 455 C528 438 558 440 584 458"/>

  <!-- Sensor/shoulder telemetry overlay -->
  <line class="ghost" x1="365" y1="542" x2="722" y2="492"/>
  <line class="ghost" x1="374" y1="492" x2="712" y2="558"/>
  <line class="line-cyan" x1="375" y1="586" x2="698" y2="523"/>
  <circle cx="375" cy="586" r="16" class="orange"/>
  <circle cx="698" cy="523" r="16" class="cyan"/>
  <text class="orange txt" x="212" y="616" font-size="24">hombro izq bajo</text>
  <text class="cyan txt" x="718" y="520" font-size="24">hombro der alto</text>
  <path d="M792 518 A255 255 0 0 0 700 507" fill="none" stroke="#2fd8e8" stroke-width="4"/>
  <text class="cyan txt" x="805" y="536" font-size="26">38°</text>
  <text class="muted txt" x="80" y="722" font-size="27">Lectura: rolido visible hacia derecha | promedio 30s dentro de objetivo</text>

  <rect class="card" x="48" y="785" width="984" height="430" rx="10"/>
  <text class="txt muted" x="80" y="845" font-size="31">Alineacion corporal</text>
  <text class="txt" x="80" y="893" font-size="44" font-weight="700">Cabeza - torso - cadera - piernas</text>
  <rect class="panel" x="80" y="925" width="920" height="230" rx="6"/>
  <line class="grid" x1="125" y1="1040" x2="955" y2="1040"/>
  <text class="muted txt" x="130" y="1024" font-size="24">linea de flotacion</text>
  <line class="line-green dash" x1="175" y1="1040" x2="905" y2="1040" opacity=".65"/>
  <path class="ghost" d="M185 1044 C300 992 425 1010 545 1037 C670 1064 790 1072 905 1044"/>
  <circle cx="205" cy="1017" r="34" class="body-fill"/>
  <ellipse cx="392" cy="1017" rx="115" ry="40" class="body-fill" opacity=".95"/>
  <path class="line-cyan" d="M185 1017 C300 987 430 1005 548 1040 C672 1078 790 1094 905 1082"/>
  <circle cx="562" cy="1042" r="18" class="cyan"/>
  <line class="line-cyan-thin" x1="580" y1="1050" x2="755" y2="1078"/>
  <line class="line-cyan-thin" x1="755" y1="1078" x2="900" y2="1082"/>
  <rect x="78" y="1170" width="330" height="55" rx="28" fill="#123b33" stroke="#2b8b61"/>
  <circle cx="112" cy="1197" r="10" class="green"/>
  <text class="green txt" x="135" y="1208" font-size="26" font-weight="700">alineacion estable</text>

  <rect class="card" x="48" y="1255" width="984" height="330" rx="10"/>
  <text class="txt muted" x="80" y="1315" font-size="31">Impulso MAG</text>
  <text class="txt" x="80" y="1363" font-size="44" font-weight="700">Empuje y energia del movimiento</text>
  <rect class="panel" x="80" y="1395" width="920" height="140" rx="6"/>
  <line class="grid-soft" x1="120" y1="1465" x2="960" y2="1465"/>
  <line class="grid-soft" x1="250" y1="1410" x2="250" y2="1520"/>
  <line class="grid-soft" x1="420" y1="1410" x2="420" y2="1520"/>
  <line class="grid-soft" x1="590" y1="1410" x2="590" y2="1520"/>
  <line class="grid-soft" x1="760" y1="1410" x2="760" y2="1520"/>
  <path class="line-green" d="M125 1493 L165 1473 L205 1440 L245 1485 L285 1475 L325 1421 L365 1465 L405 1481 L445 1450 L485 1499 L525 1463 L565 1425 L605 1475 L645 1487 L685 1443 L725 1417 L765 1477 L805 1473 L845 1433 L885 1465 L945 1445"/>
  <text class="muted txt" x="95" y="1558" font-size="23">0s</text>
  <text class="muted txt" x="910" y="1558" font-size="23">30s</text>

  <rect x="48" y="1630" width="984" height="220" rx="10" fill="#0d2832" stroke="#1c5564" stroke-width="2"/>
  <text class="cyan txt" x="80" y="1698" font-size="34" font-weight="700">Lectura para atleta / coach</text>
  <text class="txt" x="80" y="1758" font-size="38" font-weight="700">Rotacion visible y dentro del objetivo.</text>
  <text class="txt" x="80" y="1808" font-size="38" font-weight="700">Alineacion estable. Impulso normal.</text>
</svg>
