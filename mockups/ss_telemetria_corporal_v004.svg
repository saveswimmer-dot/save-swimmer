<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      .bg{fill:#020b10}
      .card{fill:#0d2832;stroke:#1c5564;stroke-width:2}
      .panel{fill:#06171d;stroke:#174451;stroke-width:2}
      .water{stroke:#2b5a66;stroke-width:5;opacity:.85}
      .guide{stroke:#2b5a66;stroke-width:2;opacity:.55}
      .txt{font-family:Arial, Helvetica, sans-serif;fill:#eaf8fb}
      .muted{fill:#a8c0c6}
      .cyan{fill:#2fd8e8}
      .orange{fill:#ff7a1a}
      .green{fill:#5df0a0}
      .red{fill:#ff5d75}
      .swimmer{fill:#163845;stroke:#eaf8fb;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .skin{fill:#dff8fb;stroke:#eaf8fb;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .arm{fill:none;stroke:#eaf8fb;stroke-width:18;stroke-linecap:round;stroke-linejoin:round}
      .arm-soft{fill:none;stroke:#eaf8fb;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;opacity:.55}
      .tech{stroke:#2fd8e8;stroke-width:9;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .tech-soft{stroke:#2fd8e8;stroke-width:4;fill:none;stroke-linecap:round;opacity:.25}
      .mag{stroke:#5df0a0;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke-dasharray:16 12}
    </style>
  </defs>

  <rect class="bg" width="1080" height="1920"/>

  <text class="txt" x="60" y="112" font-size="64" font-weight="700" letter-spacing="8">SAVE SWIMMER</text>
  <text class="cyan" x="60" y="168" font-size="34" font-weight="700" letter-spacing="5">LECTURA CORPORAL</text>
  <rect x="720" y="82" width="285" height="72" rx="8" fill="#10313c" stroke="#1d5968"/>
  <circle cx="760" cy="118" r="9" class="green"/>
  <text class="txt" x="780" y="130" font-size="28" font-weight="700">BLE + GPS activo</text>

  <rect class="card" x="48" y="210" width="984" height="575" rx="10"/>
  <text class="txt muted" x="80" y="270" font-size="31">Rotacion dorsal</text>
  <text class="txt" x="80" y="318" font-size="44" font-weight="700">Hombro derecho alto / hombro izquierdo bajo</text>
  <rect class="panel" x="80" y="350" width="920" height="365" rx="6"/>

  <line class="water" x1="120" y1="525" x2="960" y2="525"/>
  <text class="muted txt" x="132" y="506" font-size="24">linea de agua / eje 0</text>
  <line class="guide dash" x1="150" y1="455" x2="930" y2="455"/>
  <line class="guide dash" x1="150" y1="595" x2="930" y2="595"/>
  <text class="green txt" x="155" y="442" font-size="24">zona ideal 32-45°</text>
  <text class="orange txt" x="765" y="442" font-size="24">exceso +50°</text>

  <!-- Clear child-readable swimmer: head, body, two obvious arms -->
  <circle class="skin" cx="540" cy="525" r="62"/>
  <path class="swimmer" d="M405 584 C455 635 540 652 624 610 C650 596 680 572 710 540 C654 516 596 510 540 525 C488 538 442 557 405 584Z"/>
  <path class="arm" d="M405 584 C335 630 295 685 265 742"/>
  <path class="arm" d="M710 540 C765 470 835 410 930 365"/>
  <path class="arm-soft" d="M390 554 C315 536 238 536 160 558"/>
  <path class="arm-soft" d="M730 530 C800 555 870 562 940 548"/>
  <path class="swimmer" d="M500 468 C520 450 560 448 582 468"/>

  <!-- Telemetry overlay: shoulders and angle -->
  <line class="tech-soft" x1="375" y1="545" x2="715" y2="500"/>
  <line class="tech-soft" x1="382" y1="505" x2="708" y2="570"/>
  <line class="tech" x1="405" y1="584" x2="710" y2="540"/>
  <circle cx="405" cy="584" r="18" class="orange"/>
  <circle cx="710" cy="540" r="18" class="cyan"/>
  <text class="orange txt" x="205" y="618" font-size="27" font-weight="700">hombro izq bajo</text>
  <text class="cyan txt" x="730" y="538" font-size="27" font-weight="700">hombro der alto</text>
  <path d="M770 528 A210 210 0 0 0 708 510" fill="none" stroke="#2fd8e8" stroke-width="5"/>
  <text class="cyan txt" x="790" y="538" font-size="32" font-weight="700">38°</text>
  <text class="muted txt" x="80" y="754" font-size="28">Se lee como cuerpo real: un hombro sube, el otro baja. La linea cyan mide el rolido.</text>

  <rect class="card" x="48" y="825" width="984" height="440" rx="10"/>
  <text class="txt muted" x="80" y="885" font-size="31">Alineacion corporal</text>
  <text class="txt" x="80" y="933" font-size="44" font-weight="700">Cuerpo horizontal y piernas alineadas</text>
  <rect class="panel" x="80" y="965" width="920" height="240" rx="6"/>
  <line class="water" x1="120" y1="1085" x2="960" y2="1085"/>
  <text class="muted txt" x="132" y="1066" font-size="24">linea de flotacion</text>
  <line x1="175" y1="1085" x2="905" y2="1085" stroke="#5df0a0" stroke-width="5" class="dash" opacity=".65"/>
  <circle class="skin" cx="215" cy="1060" r="38"/>
  <ellipse class="swimmer" cx="410" cy="1065" rx="130" ry="46"/>
  <path class="tech" d="M200 1060 C325 1028 455 1046 575 1084 C690 1120 800 1134 910 1120"/>
  <line class="tech-soft" x1="575" y1="1084" x2="910" y2="1120"/>
  <circle cx="575" cy="1084" r="18" class="cyan"/>
  <text class="green txt" x="150" y="1164" font-size="27" font-weight="700">alineacion estable</text>
  <text class="muted txt" x="455" y="1164" font-size="25">si las piernas caen, aumenta resistencia y baja rendimiento</text>

  <rect class="card" x="48" y="1305" width="984" height="300" rx="10"/>
  <text class="txt muted" x="80" y="1365" font-size="31">Impulso MAG</text>
  <text class="txt" x="80" y="1413" font-size="44" font-weight="700">Empuje y energia del movimiento</text>
  <rect class="panel" x="80" y="1445" width="920" height="110" rx="6"/>
  <line class="guide" x1="120" y1="1500" x2="960" y2="1500"/>
  <path class="mag" d="M125 1528 L165 1508 L205 1472 L245 1520 L285 1510 L325 1460 L365 1500 L405 1518 L445 1488 L485 1530 L525 1496 L565 1464 L605 1510 L645 1522 L685 1480 L725 1460 L765 1512 L805 1508 L845 1472 L885 1500 L945 1480"/>

  <rect x="48" y="1645" width="984" height="220" rx="10" fill="#0d2832" stroke="#1c5564" stroke-width="2"/>
  <text class="cyan txt" x="80" y="1713" font-size="34" font-weight="700">Lectura simple</text>
  <text class="txt" x="80" y="1773" font-size="38" font-weight="700">Rotacion visible y dentro del objetivo.</text>
  <text class="txt" x="80" y="1823" font-size="38" font-weight="700">Alineacion estable. Impulso normal.</text>
</svg>
