  <line class="line-green dash" x1="175" y1="948" x2="905" y2="948" opacity=".65"/>
  <path class="ghost" d="M185 952 C300 900 425 918 545 945 C670 972 790 980 905 952"/>
  <path class="line-cyan" d="M185 925 C300 895 430 913 548 948 C672 986 790 1002 905 990"/>
  <circle cx="205" cy="925" r="34" fill="#123946" stroke="#2fd8e8" stroke-width="4"/>
  <ellipse cx="395" cy="925" rx="105" ry="38" fill="#123946" stroke="#2fd8e8" stroke-width="3" opacity=".85"/>
  <circle cx="562" cy="950" r="18" class="cyan"/>
  <line class="line-cyan-thin" x1="580" y1="958" x2="755" y2="986"/>
  <line class="line-cyan-thin" x1="755" y1="986" x2="900" y2="990"/>
  <text class="muted txt" x="175" y="1034" font-size="24">cabeza</text>
  <text class="muted txt" x="360" y="1034" font-size="24">torso</text>
  <text class="muted txt" x="530" y="1034" font-size="24">cadera</text>
  <text class="muted txt" x="760" y="1034" font-size="24">piernas</text>
  <rect x="78" y="1090" width="330" height="55" rx="28" fill="#123b33" stroke="#2b8b61"/>
  <circle cx="112" cy="1117" r="10" class="green"/>
  <text class="green txt" x="135" y="1128" font-size="26" font-weight="700">alineacion estable</text>

  <rect class="card" x="48" y="1175" width="984" height="340" rx="10"/>
  <text class="txt muted" x="80" y="1235" font-size="31">Impulso MAG</text>
  <text class="txt" x="80" y="1283" font-size="44" font-weight="700">Empuje y energia del movimiento</text>
  <rect class="panel" x="80" y="1315" width="920" height="150" rx="6"/>
  <line class="grid-soft" x1="120" y1="1390" x2="960" y2="1390"/>
  <line class="grid-soft" x1="250" y1="1330" x2="250" y2="1450"/>
  <line class="grid-soft" x1="420" y1="1330" x2="420" y2="1450"/>
  <line class="grid-soft" x1="590" y1="1330" x2="590" y2="1450"/>
  <line class="grid-soft" x1="760" y1="1330" x2="760" y2="1450"/>
  <path class="line-green" d="M125 1418 L165 1398 L205 1365 L245 1410 L285 1400 L325 1346 L365 1390 L405 1406 L445 1375 L485 1424 L525 1388 L565 1350 L605 1400 L645 1412 L685 1368 L725 1342 L765 1402 L805 1398 L845 1358 L885 1390 L945 1370"/>
  <text class="muted txt" x="95" y="1488" font-size="23">0s</text>
  <text class="muted txt" x="910" y="1488" font-size="23">30s</text>

  <rect x="48" y="1560" width="984" height="220" rx="10" fill="#0d2832" stroke="#1c5564" stroke-width="2"/>
  <text class="cyan txt" x="80" y="1628" font-size="34" font-weight="700">Lectura para atleta / coach</text>
  <text class="txt" x="80" y="1688" font-size="38" font-weight="700">Rotacion dentro del objetivo.</text>
  <text class="txt" x="80" y="1738" font-size="38" font-weight="700">Alineacion estable. Impulso normal.</text>
</svg>
